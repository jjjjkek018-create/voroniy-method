<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просторовий контроль · Тест для самоперевірки</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
    }
    
    .nav-links {
      display: flex;
      gap: 1rem;
    }
    
    .nav-button {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--ink-light);
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--rule);
      border-radius: 30px;
      transition: all 0.2s ease;
      background: transparent;
    }
    
    .nav-button:hover {
      border-color: var(--grass);
      color: var(--grass-dark);
      background: rgba(46, 125, 50, 0.03);
    }
    
    .quiz-container {
      background: var(--paper);
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid var(--rule);
      margin: 2rem 0;
    }
    
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
    }
    
    .quiz-progress {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 0.9rem;
      color: var(--ink-light);
    }
    
    .quiz-score {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--grass-dark);
    }
    
    .question-card {
      margin-bottom: 2rem;
    }
    
    .question-text {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: var(--ink);
    }
    
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    
    .option-item {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      background: var(--sky-light);
      border-radius: 8px;
      border: 1px solid var(--rule);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .option-item:hover {
      border-color: var(--grass);
      background: rgba(46, 125, 50, 0.05);
    }
    
    .option-item.selected {
      border-color: var(--grass);
      background: rgba(46, 125, 50, 0.1);
      border-width: 2px;
    }
    
    .option-item.correct {
      border-color: #27ae60;
      background: rgba(39, 174, 96, 0.1);
    }
    
    .option-item.incorrect {
      border-color: var(--accent);
      background: rgba(192, 57, 43, 0.05);
    }
    
    .option-letter {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--grass-dark);
      margin-right: 1.5rem;
      min-width: 25px;
    }
    
    .option-text {
      flex: 1;
      font-size: 0.95rem;
    }
    
    .quiz-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
    }
    
    .quiz-btn {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 0.9rem;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .quiz-btn.primary {
      background: var(--grass);
      color: white;
    }
    
    .quiz-btn.primary:hover {
      background: var(--grass-dark);
    }
    
    .quiz-btn.secondary {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--ink-light);
    }
    
    .quiz-btn.secondary:hover {
      border-color: var(--grass);
      color: var(--grass-dark);
    }
    
    .quiz-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .result-screen {
      text-align: center;
      padding: 2rem 0;
    }
    
    .result-score {
      font-family: 'Helvetica Neue', 'Arial', sans-serif;
      font-size: 4rem;
      font-weight: 600;
      color: var(--grass-dark);
      margin: 1rem 0;
    }
    
    .result-message {
      font-size: 1.1rem;
      color: var(--ink-light);
      margin-bottom: 2rem;
    }
    
    .result-breakdown {
      text-align: left;
      margin: 2rem 0;
    }
    
    .breakdown-item {
      display: flex;
      align-items: center;
      padding: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }
    
    .breakdown-icon {
      font-size: 1.2rem;
      margin-right: 1rem;
      min-width: 30px;
      text-align: center;
    }
    
    .breakdown-text {
      flex: 1;
    }
    
    .explanation-box {
      background: var(--sky-light);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.9rem;
      border-left: 3px solid var(--grass);
    }
    
    @media (max-width: 700px) {
      .quiz-container {
        padding: 1rem;
      }
      .option-item {
        padding: 0.8rem 1rem;
      }
      .quiz-controls {
        flex-direction: column;
        gap: 1rem;
      }
      .quiz-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <article>
    <!-- Навігація -->
    <div class="nav-top">
      <a href="conclusions.html" class="nav-button">← Підсумки</a>
      <div class="nav-links">
        <a href="index.html" class="nav-button">⌂ На початок</a>
      </div>
    </div>
    
    <!-- Заголовок -->
    <h1>Тест для самоперевірки</h1>
    
    <p>Перевірте своє розуміння ключових концепцій просторового контролю в командних видах спорту. Тест містить 15 питань, що охоплюють усі розділи посібника.</p>
    
    <!-- Контейнер квізу -->
    <div class="quiz-container" id="quizContainer">
      <!-- Динамічний вміст -->
    </div>
    
    <!-- Номер сторінки -->
    <div class="page-number">— 17 —</div>
  </article>
  
  <script>
    (function() {
      'use strict';
      
      const questions = [
        {
          question: "Хто формалізував діаграми поділу простору, які сьогодні використовуються в спортивному аналізі?",
          options: ["Петер Діріхле", "Георгій Вороний", "Джеймс Бардін", "Альберт Ейнштейн"],
          correct: 1,
          explanation: "Георгій Вороний у 1907 році створив завершену математичну теорію поділу простору. Діріхле описав концепцію раніше (1850), але саме Вороний формалізував діаграми."
        },
        {
          question: "Що таке домінантний регіон гравця?",
          options: [
            "Зона, де гравець найчастіше забиває голи",
            "Територія, яка знаходиться ближче до гравця, ніж до будь-якого іншого учасника",
            "Частина поля, яку гравець контролює за вказівкою тренера",
            "Зона, де гравець має найвищу швидкість"
          ],
          correct: 1,
          explanation: "Домінантний регіон — це територія, яка фізично ближче до гравця, ніж до будь-якого іншого. Саме цей принцип лежить в основі діаграм Вороного."
        },
        {
          question: "Як змінюються домінантні регіони атакуючих гравців порівняно із захисниками у футзалі?",
          options: [
            "Вони однакові за розміром",
            "Атакуючі мають менші регіони",
            "Атакуючі мають більші та регулярніші регіони",
            "Захисники мають більші регіони"
          ],
          correct: 2,
          explanation: "Дослідження показують, що атакуючі гравці мають більші за розміром домінантні регіони з більш регулярною формою, оскільки вони намагаються розтягнути оборону."
        },
        {
          question: "Що показує накладання діаграм Вороного двох команд?",
          options: [
            "Загальну кількість пасів у матчі",
            "Зони прямого конфлікту, де регіони обох команд перетинаються",
            "Швидкість переміщення гравців",
            "Відсоток володіння м'ячем"
          ],
          correct: 1,
          explanation: "Накладені діаграми демонструють зони прямого конфлікту на полі — ділянки, де домінантні регіони атакуючої та захисної команд накладаються. Саме там найчастіше відбуваються відбори."
        },
        {
          question: "У сценарії 5 на 4 у футзалі, де повинні розташовуватися захисники?",
          options: [
            "Широко по всьому полю",
            "Компактно в центральній зоні",
            "Біля бокових ліній",
            "Один біля воріт, решта в атаці"
          ],
          correct: 1,
          explanation: "Захисна четвірка повинна компенсувати нестачу гравця компактним розташуванням у центрі, змушуючи суперника атакувати через менш небезпечні фланги."
        },
        {
          question: "Який показник дозволяє розрізнити перехідну фазу та позиційний напад у баскетболі?",
          options: [
            "Кількість кидків",
            "Відсоток контрольованої площі",
            "Час володіння м'ячем",
            "Кількість передач"
          ],
          correct: 1,
          explanation: "Зміна відсотка контрольованої площі в кожен момент часу чудово описує моделі просторової організації та дозволяє класифікувати фази гри."
        },
        {
          question: "Яке з обмежень НЕ властиве статичним діаграмам Вороного?",
          options: [
            "Ігнорування швидкості гравців",
            "Відсутність інформації про позицію м'яча",
            "Врахування тактичної схеми команди",
            "Ігнорування орієнтації корпусу гравця"
          ],
          correct: 2,
          explanation: "Статичні діаграми НЕ враховують тактичну схему, швидкість, позицію м'яча та орієнтацію корпусу. Вони базуються лише на географічній відстані."
        },
        {
          question: "Який критерій використовується в динамічних моделях контролю поля замість географічної відстані?",
          options: [
            "Кількість гравців у зоні",
            "Розрахунковий час прибуття до точки",
            "Відстань до воріт",
            "Кут передачі"
          ],
          correct: 1,
          explanation: "Інноваційність динамічного контролю полягає у заміні критерію відстані на критерій часу — модель розраховує час, потрібний гравцю для досягнення точки."
        },
        {
          question: "Що таке PPDA (Passes Per Defensive Action)?",
          options: [
            "Кількість пасів за матч",
            "Відношення пасів суперника до захисних дій — індикатор інтенсивності пресингу",
            "Відсоток точних передач",
            "Кількість перехоплень за гру"
          ],
          correct: 1,
          explanation: "PPDA = паси суперника / захисні дії. Чим менше значення, тим вища інтенсивність пресингу — суперник встигає зробити менше пасів до втрати м'яча."
        },
        {
          question: "Яка просторова роль воротаря в сучасному футболі?",
          options: [
            "Тільки відбивати удари",
            "Контролювати простір за спинами захисників і починати атаки",
            "Керувати замінами",
            "Виконувати штрафні удари"
          ],
          correct: 1,
          explanation: "Елітні воротарі контролюють великий простір за спинами оборонців, читають траєкторії довгих передач і вчасно виходять для вибивання, дозволяючи команді тримати високу лінію."
        },
        {
          question: "Який вид спорту має найбільший простір на одного гравця?",
          options: ["Баскетбол", "Футзал", "Футбол", "Гандбол"],
          correct: 2,
          explanation: "Футбол має ~650 м² на гравця — найбільший показник. Баскетбол — лише ~84 м², футзал — ~160 м², гандбол — ~114 м²."
        },
        {
          question: "Який метод збору позиційних даних забезпечує найвищу точність?",
          options: ["GPS-трекери", "Ручне кодування", "Оптичне відстеження (Optical Tracking)", "Аналіз відео вручну"],
          correct: 2,
          explanation: "Оптичне відстеження (наприклад, Second Spectrum) забезпечує точність ±5 см при частоті 25 Гц. GPS має точність ~50 см, UWB — ~10 см."
        },
        {
          question: "Які три просторові вектори є фундаментом гри на будь-якому рівні підготовки?",
          options: [
            "Біг, стрибки, кидки",
            "Переміщення навколо суперника, передача через лінію, пас над захисниками",
            "Захист, атака, пресинг",
            "Швидкість, сила, витривалість"
          ],
          correct: 1,
          explanation: "Контроль позицій базується на трьох векторах: переміщення навколо суперника, передача через лінію суперника та пас над захисниками."
        },
        {
          question: "Яка з платформ надає відкритий доступ до даних відстеження футбольних матчів?",
          options: ["Second Spectrum", "Catapult Sports", "Metrica Sports", "Hudl Sportscode"],
          correct: 2,
          explanation: "Metrica Sports надає найбільший відкритий набір даних відстеження — координати всіх гравців та м'яча для трьох повних матчів з частотою 25 Гц."
        },
        {
          question: "Який головний висновок щодо просторового контролю в командних видах спорту?",
          options: [
            "Простір не має значення, важлива лише техніка",
            "Контроль простору є ключем до контролю гри",
            "Тільки фізична підготовка визначає перемогу",
            "Тактика не впливає на результат"
          ],
          correct: 1,
          explanation: "Фундамент сучасної гри будується на розумінні просторової геометрії. Здатність команди ущільнювати простір у захисті та розширювати в атаці є головним показником ігрового інтелекту."
        }
      ];
      
      let currentQuestion = 0;
      let userAnswers = new Array(questions.length).fill(null);
      let quizSubmitted = false;
      let score = 0;
      
      const container = document.getElementById('quizContainer');
      
      function renderQuiz() {
        if (quizSubmitted) {
          renderResults();
          return;
        }
        
        const q = questions[currentQuestion];
        const selected = userAnswers[currentQuestion];
        
        let html = `
          <div class="quiz-header">
            <span class="quiz-progress">Питання ${currentQuestion + 1} з ${questions.length}</span>
            <span class="quiz-score">${userAnswers.filter(a => a !== null).length}/${questions.length}</span>
          </div>
          
          <div class="question-card">
            <div class="question-text">${currentQuestion + 1}. ${q.question}</div>
            <div class="options-list">
        `;
        
        q.options.forEach((opt, idx) => {
          const isSelected = selected === idx;
          html += `
            <div class="option-item ${isSelected ? 'selected' : ''}" data-option="${idx}">
              <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
              <span class="option-text">${opt}</span>
            </div>
          `;
        });
        
        html += `
            </div>
          </div>
          
          <div class="quiz-controls">
            <button class="quiz-btn secondary" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}>← Попереднє</button>
            <button class="quiz-btn primary" id="nextBtn">${currentQuestion === questions.length - 1 ? 'Завершити' : 'Наступне →'}</button>
          </div>
        `;
        
        container.innerHTML = html;
        
        // Додаємо обробники
        document.querySelectorAll('.option-item').forEach(item => {
          item.addEventListener('click', function() {
            const optIdx = parseInt(this.dataset.option);
            userAnswers[currentQuestion] = optIdx;
            renderQuiz();
          });
        });
        
        document.getElementById('prevBtn')?.addEventListener('click', () => {
          if (currentQuestion > 0) {
            currentQuestion--;
            renderQuiz();
          }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
          if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            renderQuiz();
          } else {
            // Перевіряємо, чи всі питання мають відповіді
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
              if (!confirm(`У вас є ${unanswered} питань без відповіді. Завершити все одно?`)) {
                return;
              }
            }
            submitQuiz();
          }
        });
      }
      
      function submitQuiz() {
        score = 0;
        userAnswers.forEach((ans, idx) => {
          if (ans === questions[idx].correct) score++;
        });
        quizSubmitted = true;
        renderResults();
      }
      
      function renderResults() {
        const percentage = Math.round((score / questions.length) * 100);
        
        let message = '';
        if (percentage >= 90) message = 'Відмінно! Ви глибоко засвоїли матеріал.';
        else if (percentage >= 70) message = 'Добре! Але деякі теми варто повторити.';
        else if (percentage >= 50) message = 'Задовільно. Рекомендуємо переглянути відповідні розділи.';
        else message = 'Варто ще раз опрацювати матеріал. Не здавайтеся!';
        
        let html = `
          <div class="result-screen">
            <h2 style="margin-bottom: 0;">Результат тесту</h2>
            <div class="result-score">${score}/${questions.length}</div>
            <div class="result-message">${message}</div>
            
            <div class="result-breakdown">
              <h3 style="margin-bottom: 1.5rem;">Детальний розбір</h3>
        `;
        
        questions.forEach((q, idx) => {
          const userAns = userAnswers[idx];
          const isCorrect = userAns === q.correct;
          
          html += `
            <div class="breakdown-item">
              <span class="breakdown-icon">${isCorrect ? '✅' : '❌'}</span>
              <span class="breakdown-text">
                <strong>${idx + 1}. ${q.question}</strong><br>
                <span style="color: ${isCorrect ? '#27ae60' : 'var(--accent)'};">
                  Ваша відповідь: ${userAns !== null ? String.fromCharCode(65 + userAns) + '. ' + q.options[userAns] : 'Немає відповіді'}
                </span>
                ${!isCorrect ? `<br><span style="color: #27ae60;">Правильна: ${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}</span>` : ''}
              </span>
            </div>
            <div class="explanation-box">
              <strong>Пояснення:</strong> ${q.explanation}
            </div>
          `;
        });
        
        html += `
            </div>
            
            <div class="quiz-controls" style="justify-content: center; gap: 1rem;">
              <button class="quiz-btn primary" id="retakeBtn">Пройти тест знову</button>
              <a href="index.html" class="quiz-btn secondary" style="text-decoration: none; display: inline-block;">На головну</a>
            </div>
          </div>
        `;
        
        container.innerHTML = html;
        
        document.getElementById('retakeBtn')?.addEventListener('click', () => {
          currentQuestion = 0;
          userAnswers = new Array(questions.length).fill(null);
          quizSubmitted = false;
          score = 0;
          renderQuiz();
        });
      }
      
      // Початковий рендер
      renderQuiz();
    })();
  </script>
</body>
</html>
